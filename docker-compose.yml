services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./backend/ontology.ttl:/app/ontology.ttl:ro
    environment:
      - DATA_DIR=/data
      - CORS_ORIGINS=http://localhost:5173,http://localhost,http://localhost:80
    restart: unless-stopped

  mcp:
    build: ./backend
    ports:
      - "8001:8001"
    depends_on:
      - backend
    environment:
      - CODE_GRAPH_URL=http://backend:8000
    command: ["python", "mcp_server.py", "--transport", "http", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
