services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./backend/ontology.ttl:/app/ontology.ttl:ro
    environment:
      - DATA_DIR=/data
      - CORS_ORIGINS=http://localhost:5173,http://localhost,http://localhost:80
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
